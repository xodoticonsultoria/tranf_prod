{% extends "base.html" %}
{% block title %}Meus Pedidos{% endblock %}
{% block content %}

<h2 class="area-title">
  MEUS PEDIDOS
</h2>

<div class="order-table-wrap">

  <table class="order-table">

    <thead>
      <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Data</th>
        <th>Ação</th>
      </tr>
    </thead>

    <tbody>
      {% for o in orders %}
      <tr>
        <td class="prod-name">
          #{{ o.id }}
        </td>

        <td>
          <span class="order-status-badge">
            {{ o.get_status_display|upper }}
          </span>
        </td>

        <td>
          {{ o.created_at|date:"d/m/Y H:i" }}
        </td>

        <td>
          <a href="{% url 'q_order_detail' o.id %}" class="btn-mini btn-mini-sm">
            Abrir
          </a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="4" style="text-align:center;">
          Nenhum pedido encontrado.
        </td>
      </tr>
      {% endfor %}
    </tbody>

  </table>

</div>


<script>
const socket = new WebSocket(
    "wss://" + window.location.host + "/ws/orders/"
);

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    const orderRow = document.getElementById("order-row-" + data.order_id);

    // Atualiza STATUS
    if (orderRow) {

        const badge = orderRow.querySelector(".status-badge");

        if (badge) {
            badge.innerText = data.status_display;
        }

        // 🔥 Se virou RECEIVED ou DISPATCHED, remove da tela
        if (data.status === "RECEIVED" || data.status === "DISPATCHED") {
            orderRow.style.transition = "0.3s";
            orderRow.style.opacity = "0";
            setTimeout(() => orderRow.remove(), 300);
        }
    }

    // 🔥 Atualiza badge contador
    updateBadge();
};

function updateBadge(){
    const badge = document.getElementById("orders-badge");
    if(!badge) return;

    let count = document.querySelectorAll(".order-row").length;
    badge.innerText = count;
}
</script>

{% endblock %}
